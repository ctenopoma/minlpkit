# pre-commit 設定。CI(mkdocs build --strict)で初めて気づく docs 破綻を、push 前に前倒しで捕まえる。
#
# セットアップ(初回のみ):
#   uv run pre-commit install            # pre-commit + pre-push フックを .git/hooks へ導入
# 手動で全チェック:
#   uv run pre-commit run --all-files --hook-stage pre-push
#
# 方針:
# - docs のビルド検証は ~2分かかるため、毎コミットではなく **push 前(pre-push)** かつ
#   **docs/ か mkdocs.yml が変わったときだけ** 走らせる(それ以外の push では skip)。
# - 軽量な整形チェック(末尾空白・改行・yaml/json 構文)は毎コミット(pre-commit)で走らせる。

default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # mkdocs.yml は !!python/name: 等のカスタムタグを使うため、タグ解決せず構文のみ検査する
        args: [--unsafe]
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: mkdocs-strict
        name: mkdocs build --strict (docs 変更時・push 前)
        entry: uv run mkdocs build --strict
        language: system
        pass_filenames: false
        stages: [pre-push]
        files: ^(docs/.*|mkdocs\.yml)$
