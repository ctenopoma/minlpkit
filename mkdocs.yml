site_name: minlpkit
site_description: MINLPの可視化・診断・改善検証を一体化したPySCIPOptツールキット
docs_dir: docs
use_directory_urls: false

theme:
  name: material
  logo: assets/icon.jpg
  favicon: assets/icon.jpg
  language: ja
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードへ
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードへ

plugins:
  - search
  - drawio
  - glightbox
  - git-revision-date-localized:
      type: timeago
  - macros
  - mkdocs-jupyter:
      include_source: true
      execute: false
      ignore_h1_titles: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            heading_level: 2

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

nav:
  - はじめに: index.md
  - 学ぶ:
      - クイックスタート: notebooks/quickstart.ipynb
  - プレイブック(症状→打ち手): playbook.md
  - 実践:
      - ハンズオン(1)可視化・診断編: notebooks/hands_on_diagnosis.ipynb
      - ハンズオン(2)改善編: notebooks/hands_on_improvement.ipynb
      - 診断センサス: census.md
      - ギャラリー: gallery.md
      - サンプルカタログ:
          - 概要(全126本): samples/index.md
          - スケジューリング: samples/scheduling.md
          - エネルギー・マイクログリッド: samples/energy_and_microgrid.md
          - 立地・ネットワーク設計: samples/location_and_network_design.md
          - 経路・物流: samples/routing_and_logistics.md
          - その他(基礎・拡張題材): samples/others.md
          - グラフ・離散構造: samples/graph_and_discrete.md
          - 物理・制御MINLP: samples/physics_and_control_minlp.md
          - 製造・ブレンド: samples/manufacturing_and_blending.md
          - 金融・価格設計: samples/finance_and_pricing.md
          - パッキング・カッティング: samples/packing_and_cutting.md
  - リファレンス:
      - 利用マニュアル: manual.md
      - パイプライン (analyze/Report): api/pipeline.md
      - 比較 (compare_variants): api/compare.md
      - 変換 (transforms): api/transforms.md
      - フレームワーク (frameworks): api/frameworks.md
      - 診断ルール (diagnose): api/diagnose.md
      - ライブ可視化 (live): api/live.md
      - チューニング (tune): api/tune.md

extra_css:
  - stylesheets/extra.css

extra:
  minlpkit_version: "0.1.0"

extra_javascript:
  - javascripts/copy_md.js

hooks:
  - hooks.py
