site_name: minlpkit
site_description: MINLPの可視化・診断・改善検証を一体化したPySCIPOptツールキット
docs_dir: docs
use_directory_urls: false

theme:
  name: material
  logo: assets/icon.jpg
  favicon: assets/icon.jpg
  language: ja
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードへ
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードへ

plugins:
  - search
  - drawio
  - glightbox
  - git-revision-date-localized:
      type: timeago
      strict: false  # 未コミットの新規notebook等でも WARNING を出さない(mkdocs build --strict を通す)
  - macros
  - mkdocs-jupyter:
      include_source: true
      execute: false
      ignore_h1_titles: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            heading_level: 2

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

nav:
  - ホーム: index.md
  - はじめに:
      - インストール: manual/index.md
      - クイックスタート: notebooks/quickstart.ipynb
  - ガイド:
      - プレイブック(症状→打ち手):
          - 症状から打ち手へ(目次): playbook/index.md
          - 0. 診断そのもの: playbook/00-diagnose.md
          - 1. 整数×連続の厳密線形化: playbook/01-linearize.md
          - 2. PWL近似(SOS2): playbook/02-pwl-sos2.md
          - 3. Big-M排除: playbook/03-bigm.md
          - 4. SCIPパラメータチューニング: playbook/04-tuning.md
          - 5. ベンダーズ分解: playbook/05-benders.md
          - 6. 列生成: playbook/06-column-generation.md
          - 7. GPU warm start: playbook/07-gpu.md
          - 8. 条件数・数値健全性: playbook/08-condition.md
          - 9. ライブ監視・run記録・再現: playbook/09-live-monitor.md
          - "参考: SCIPが自動でやること": playbook/10-reference-scip-handles.md
      - 手法notebook(原理→適用→効果):
          - 整数×連続の厳密線形化: notebooks/improve/01_linearize_product.ipynb
          - PWL近似(SOS2): notebooks/improve/02_pwl_sos2.ipynb
          - Big-M排除(tight M・Indicator): notebooks/improve/03_bigm_indicator.ipynb
          - SCIPパラメータチューニング: notebooks/improve/04_tuning.ipynb
          - ベンダーズ分解: notebooks/improve/05_benders.ipynb
          - 列生成: notebooks/improve/06_column_generation.ipynb
          - GPU warm start: notebooks/improve/07_gpu_warmstart.ipynb
          - 条件数・数値健全性: notebooks/improve/08_condition_number.ipynb
      - 可視化notebook(診断エンジンの中身):
          - McCormick緩和+空間分枝木: notebooks/diagnose/01_mccormick_spatial_tree.ipynb
          - 違反ヒートマップ: notebooks/diagnose/02_violation_heatmap.ipynb
          - gap停滞とattribution: notebooks/diagnose/03_gap_stall_attribution.ipynb
          - 静的診断(スケール・ブロック構造・対称性): notebooks/diagnose/04_static_diagnosis.ipynb
      - ハンズオン(1)可視化・診断編: notebooks/hands_on_diagnosis.ipynb
      - ハンズオン(2)改善編: notebooks/hands_on_improvement.ipynb
      - 診断センサス: census.md
  - サンプル:
      - サンプルカタログ:
          - 概要(全126本): samples/index.md
          - スケジューリング: samples/scheduling.md
          - エネルギー・マイクログリッド: samples/energy_and_microgrid.md
          - 立地・ネットワーク設計: samples/location_and_network_design.md
          - 経路・物流: samples/routing_and_logistics.md
          - その他(基礎・拡張題材): samples/others.md
          - グラフ・離散構造: samples/graph_and_discrete.md
          - 物理・制御MINLP: samples/physics_and_control_minlp.md
          - 製造・ブレンド: samples/manufacturing_and_blending.md
          - 金融・価格設計: samples/finance_and_pricing.md
          - パッキング・カッティング: samples/packing_and_cutting.md
      - ギャラリー: gallery.md
  - リファレンス:
      - 利用マニュアル:
          - ワークフロー全体像: manual/workflow.md
          - ライブモニタの使い方: manual/live-monitor.md
          - GPU warm start: manual/gpu-setup.md
          - 制約・落とし穴: manual/pitfalls.md
      - パイプライン (analyze/Report): api/pipeline.md
      - 比較 (compare_variants): api/compare.md
      - 変換 (transforms): api/transforms.md
      - フレームワーク (frameworks): api/frameworks.md
      - 診断ルール (diagnose): api/diagnose.md
      - ライブ可視化 (live): api/live.md
      - チューニング (tune): api/tune.md

extra_css:
  - stylesheets/extra.css

extra:
  minlpkit_version: "0.1.0"

extra_javascript:
  - javascripts/copy_md.js

hooks:
  - hooks.py
