site_name: minlpkit
site_description: MINLPの可視化・診断・改善検証を一体化したPySCIPOptツールキット
docs_dir: docs
use_directory_urls: false

theme:
  name: material
  language: ja
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードへ
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードへ

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      execute: false
      ignore_h1_titles: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true

nav:
  - ホーム: index.md
  - 利用マニュアル: manual.md
  - 試してみる:
      - クイックスタート: notebooks/quickstart.ipynb
      - ハンズオン(1)可視化・診断編: notebooks/hands_on_diagnosis.ipynb
      - ハンズオン(2)改善編: notebooks/hands_on_improvement.ipynb
  - 診断センサス: census.md
  - APIリファレンス:
      - パイプライン (analyze/Report): api/pipeline.md
      - 比較 (compare_variants): api/compare.md
      - 変換 (transforms): api/transforms.md
      - フレームワーク (frameworks): api/frameworks.md
      - 診断ルール (diagnose): api/diagnose.md
      - ライブ可視化 (live): api/live.md
      - チューニング (tune): api/tune.md
  - ギャラリー: gallery.md
