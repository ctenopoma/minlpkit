site_name: minlpkit
site_description: MINLPの可視化・診断・改善検証を一体化したPySCIPOptツールキット
docs_dir: docs
use_directory_urls: false

theme:
  name: material
  logo: assets/icon.jpg
  favicon: assets/icon.jpg
  language: ja
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードへ
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードへ

plugins:
  - search
  - drawio
  - glightbox
  - git-revision-date-localized:
      type: timeago
      strict: false  # 未コミットの新規notebook等でも WARNING を出さない(mkdocs build --strict を通す)
  - macros
  - mkdocs-jupyter:
      include_source: true
      execute: false
      ignore_h1_titles: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            heading_level: 2

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

nav:
  - ホーム: index.md
  - はじめに:
      - セットアップ: manual/index.md
      - クイックスタート: notebooks/quickstart.ipynb
  - ガイド:
      - 症状から手法を選ぶ:
          - 目次: playbook/index.md
          - 0. 診断そのもの:
              - ガイド: playbook/00-diagnose.md
              - 空間分枝木: notebooks/diagnose/01_mccormick_spatial_tree.ipynb
              - 違反ヒートマップ: notebooks/diagnose/02_violation_heatmap.ipynb
              - gap停滞とattribution: notebooks/diagnose/03_gap_stall_attribution.ipynb
              - 静的診断(スケール・ブロック構造・対称性): notebooks/diagnose/04_static_diagnosis.ipynb
          - 1. 整数×連続の厳密線形化:
              - ガイド: playbook/01-linearize.md
              - ノートブックで確認: notebooks/improve/01_linearize_product.ipynb
          - 2. PWL近似(SOS2):
              - ガイド: playbook/02-pwl-sos2.md
              - ノートブックで確認: notebooks/improve/02_pwl_sos2.ipynb
          - 3. Big-M排除:
              - ガイド: playbook/03-bigm.md
              - ノートブックで確認: notebooks/improve/03_bigm_indicator.ipynb
          - 4. SCIPパラメータチューニング:
              - ガイド: playbook/04-tuning.md
              - ノートブックで確認: notebooks/improve/04_tuning.ipynb
          - 5. ベンダーズ分解:
              - ガイド: playbook/05-benders.md
              - ノートブックで確認: notebooks/improve/05_benders.ipynb
          - 6. 列生成:
              - ガイド: playbook/06-column-generation.md
              - ノートブックで確認: notebooks/improve/06_column_generation.ipynb
          - 7. GPU warm start:
              - ガイド: playbook/07-gpu.md
              - セットアップ手順: manual/gpu-setup.md
              - ノートブックで確認: notebooks/improve/07_gpu_warmstart.ipynb
          - 8. 条件数・数値健全性:
              - ガイド: playbook/08-condition.md
              - ノートブックで確認: notebooks/improve/08_condition_number.ipynb
          - 9. ライブ監視・run記録・再現:
              - ガイド: playbook/09-live-monitor.md
              - セットアップ手順: manual/live-monitor.md
          - "参考: SCIPが自動でやること": playbook/10-reference-scip-handles.md
      - 旗艦サンプルで学ぶ(事業ストーリー→診断→改善):
          - 石油プーリング多期計画(T1): notebooks/samples/petroleum_pooling.ipynb
          - 鋳造の多期チャージ配合(T1): notebooks/samples/foundry_charge_mix_multiperiod.ipynb
          - 週次UC+送電混雑(T2): notebooks/samples/weekly_uc_ramp.ipynb
          - 水頭依存効率の水力カスケード(T2): notebooks/samples/hydro_cascade_efficiency.ipynb
          - 送電線増強計画+運用(T3): notebooks/samples/transmission_expansion_operation.ipynb
          - マイクログリッド設計+運用(T3): notebooks/samples/microgrid_design_operation.ipynb
          - 交流最適潮流 AC-OPF(T9): notebooks/samples/ac_opf.ipynb
      - 診断センサス(全サンプル一括診断の結果): census.md
  - サンプル:
      - サンプルカタログ:
          - 概要(全129本): samples/index.md
          - スケジューリング: samples/scheduling.md
          - エネルギー・マイクログリッド: samples/energy_and_microgrid.md
          - 立地・ネットワーク設計: samples/location_and_network_design.md
          - 経路・物流: samples/routing_and_logistics.md
          - その他(基礎・拡張題材): samples/others.md
          - グラフ・離散構造: samples/graph_and_discrete.md
          - 物理・制御MINLP: samples/physics_and_control_minlp.md
          - 製造・ブレンド: samples/manufacturing_and_blending.md
          - 金融・価格設計: samples/finance_and_pricing.md
          - パッキング・カッティング: samples/packing_and_cutting.md
      - ギャラリー: gallery.md
  - リファレンス:
      - 利用マニュアル:
          - マニュアル概要: manual/index.md
          - ワークフロー全体像: manual/workflow.md
          - 制約・落とし穴: manual/pitfalls.md
      - パイプライン (analyze/Report): api/pipeline.md
      - 比較 (compare_variants): api/compare.md
      - 変換 (transforms): api/transforms.md
      - フレームワーク (frameworks): api/frameworks.md
      - 診断ルール (diagnose): api/diagnose.md
      - ライブ可視化 (live): api/live.md
      - チューニング (tune): api/tune.md

extra_css:
  - stylesheets/extra.css

extra:
  minlpkit_version: "0.1.0"

extra_javascript:
  - javascripts/copy_md.js

hooks:
  - hooks.py
