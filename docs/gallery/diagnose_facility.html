<!doctype html><html lang="ja"><head><meta charset="utf-8">
<title>診断サマリ facility</title>
<style>
 body { margin:0; background:#f9f9f7; color:#0b0b0b; font-family:system-ui, -apple-system, "Segoe UI", sans-serif; }
 .wrap { max-width:940px; margin:0 auto; padding:22px 16px; }
 h1 { font-size:18px; margin:0 0 4px; }
 .sub { color:#52514e; font-size:12px; margin-bottom:14px; }
 h2 { font-size:14px; margin:18px 0 8px; color:#52514e; }
 .tiles { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
 .tile { background:#fcfcfb; border:1px solid rgba(11,11,11,0.10);
          border-radius:8px; padding:9px 13px; min-width:120px; }
 .tile-label { font-size:11px; color:#898781; }
 .tile-value { font-size:18px; font-variant-numeric:tabular-nums; }
 .finding { background:#fcfcfb; border:1px solid rgba(11,11,11,0.10);
             border-radius:8px; padding:12px 14px; margin-bottom:10px; }
 .fhead { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
 .badge { color:#fff; font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px; }
 .symptom { font-size:14px; font-weight:600; }
 .frow { font-size:12.5px; color:#52514e; line-height:1.7; }
 .frow .k { display:inline-block; width:44px; color:#898781; }
 a { text-decoration:none; }
</style></head><body><div class="wrap">
<h1>診断サマリと改善提案</h1>
<div class="sub">facility — 観測量を診断ルールに通した結果。推薦した改善は別途実施・検証する</div>
<h2>観測量</h2>
<div class="tiles"><div class="tile"><div class="tile-label">最終gap</div><div class="tile-value">0.9%</div></div><div class="tile"><div class="tile-label">空間分枝の双対寄与</div><div class="tile-value">0%</div></div><div class="tile"><div class="tile-label">停滞区間</div><div class="tile-value">0</div></div><div class="tile"><div class="tile-label">支配ボトルネック</div><div class="tile-value">—</div></div><div class="tile"><div class="tile-label">係数max/min比</div><div class="tile-value">1.5e+02</div></div><div class="tile"><div class="tile-label">Big-M候補</div><div class="tile-value">0</div></div><div class="tile"><div class="tile-label">最大対称群</div><div class="tile-value">0</div></div><div class="tile"><div class="tile-label">最大結合グループ</div><div class="tile-value">6</div></div></div>
<h2>検出した症状 → 推薦する改善(0件)</h2>
<div class="finding">検出された症状はありません。</div>
</div></body></html>
